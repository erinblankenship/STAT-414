project:
  type: book
  output-dir: docs


editor: visual
book: 
  title: Stat 414 Notes
  
  chapters:
    - index.qmd
    - Section-1-Introduction.qmd
    - Section-2-Prob-Samples.qmd
    - Section-3-SRS.qmd

  

  downloads: [pdf]    

format: 
  html: default
  pdf:   
    header-includes:
        - \usepackage{float}
        - \floatplacement{table}{H}  
    output-file: pdf-book
    fontsize: 12pt
    geometry: 
      - top=20mm
      - left=15mm
      - right=10mm

   


